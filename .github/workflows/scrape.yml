name: Scrape UEFA Rankings

on:
  schedule:
    - cron: "*/3 17-23 * * 2,3,4"
    - cron: "*/10 17-23 * * 0,4,5"
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      season:
        description: 'Season (e.g. 2025-26) or "all"'
        required: false
        default: "2025-26"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r scraper/requirements.txt

      - name: Scrape season
        if: github.event.inputs.season != 'all'
        run: python scraper/scraper.py --season "${{ github.event.inputs.season || '2025-26' }}"

      - name: Scrape ALL (oldest first for history)
        if: github.event.inputs.season == 'all'
        run: python scraper/scraper.py --all --delay 3

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "data: update UEFA rankings $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
