name: Scrape UEFA Rankings

on:
  schedule:
    # Every day at 17:00, 18:30, 20:30, 22:30 UTC (match windows)
    - cron: '0 17 * * *'
    - cron: '30 18 * * *'
    - cron: '30 20 * * *'
    - cron: '30 22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        required: false
        default: 'current'
        type: choice
        options:
          - current
          - all_seasons

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Scrape current season
        if: ${{ github.event.inputs.mode != 'all_seasons' }}
        run: python scraper/scraper.py --season 2025-26

      - name: Scrape all seasons (historical bootstrap)
        if: ${{ github.event.inputs.mode == 'all_seasons' }}
        run: python scraper/scraper.py --all --delay 4

      - name: Commit and push
        run: |
          git config user.name "UEFA Scraper Bot"
          git config user.email "bot@github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: update rankings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
