name: Scrape UEFA Rankings

on:
  # Run every 3 minutes on European match nights (Tue/Wed/Thu, 17:00–23:59 UTC)
  schedule:
    - cron: "*/3 17-23 * * 2,3,4"   # Tue/Wed/Thu evenings (CL, EL, ECL matchdays)
    - cron: "*/10 17-23 * * 0,4,5"  # Sun/Thu/Fri less frequent (EL/ECL qualifiers)
    - cron: "0 8 * * 1"             # Every Monday morning for weekly refresh

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      season:
        description: 'Season to scrape (e.g. 2025-26, or "all")'
        required: false
        default: "2025-26"

permissions:
  contents: write   # needed to commit data files

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape current season
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.season != 'all'
        run: |
          SEASON="${{ github.event.inputs.season || '2025-26' }}"
          python scraper/scraper.py --season "$SEASON"

      - name: Scrape ALL seasons
        if: github.event.inputs.season == 'all'
        run: python scraper/scraper.py --all --delay 3

      - name: Copy data to public/data for static hosting
        run: |
          mkdir -p public/data
          cp data/*.json public/data/ 2>/dev/null || true

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update UEFA rankings $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
